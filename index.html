<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Phone BD — 240×360</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;min-height:100vh;
  background:#111;
  display:flex;align-items:center;justify-content:center;
  font-family:'Exo 2',sans-serif;
}

/* ── THE CARD: exact 240×360 ── */
.card{
  width:240px;
  height:360px;
  position:relative;
  border-radius:18px;
  overflow:hidden;
  flex-shrink:0;

  /* Deep space background */
  background:
    radial-gradient(ellipse 120% 60% at 50% 0%,  rgba(0,80,220,0.55) 0%, transparent 55%),
    radial-gradient(ellipse 80%  50% at 10% 90%,  rgba(0,200,255,0.18) 0%, transparent 50%),
    radial-gradient(ellipse 60%  40% at 90% 70%,  rgba(120,40,255,0.18) 0%, transparent 50%),
    #00060e;

  box-shadow:
    0 0 0 2px rgba(0,229,255,0.45),
    0 0 30px rgba(0,150,255,0.4),
    0 0 70px rgba(0,80,200,0.25),
    0 0 120px rgba(0,50,150,0.15);
}

/* ── SPINNING CONIC BORDER ── */
.card-border{
  position:absolute;inset:-2px;border-radius:20px;
  background:conic-gradient(
    from 0deg,
    transparent 0%, #00e5ff 8%, #0057ff 20%, #7c3aed 32%,
    transparent 44%, transparent 56%,
    #7c3aed 68%, #0057ff 80%, #00e5ff 92%, transparent 100%
  );
  animation:spinBrd 3s linear infinite;
  z-index:0;
}
@keyframes spinBrd{to{transform:rotate(360deg);}}
.card-inner-bg{
  position:absolute;inset:2px;border-radius:16px;
  background:
    radial-gradient(ellipse 120% 60% at 50% 0%,rgba(0,80,220,0.55) 0%,transparent 55%),
    radial-gradient(ellipse 80% 50% at 10% 90%,rgba(0,200,255,0.18) 0%,transparent 50%),
    radial-gradient(ellipse 60% 40% at 90% 70%,rgba(120,40,255,0.18) 0%,transparent 50%),
    #00060e;
  z-index:1;
}

/* Everything inside sits on z-index:2+ */
.content{position:absolute;inset:2px;border-radius:16px;overflow:hidden;z-index:2;display:flex;flex-direction:column;align-items:center;}

/* ── STAR CANVAS ── */
#sc{position:absolute;inset:0;width:100%;height:100%;z-index:0;}

/* Grid */
.grid{
  position:absolute;inset:0;z-index:1;
  background-image:
    linear-gradient(rgba(0,229,255,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,0.04) 1px,transparent 1px);
  background-size:24px 24px;
}

/* Top shimmer line */
.top-line{
  position:absolute;top:0;left:10%;width:80%;height:1px;z-index:3;
  background:linear-gradient(90deg,transparent,#00e5ff,rgba(255,255,255,0.7),#00e5ff,transparent);
  animation:tl 2s ease-in-out infinite alternate;
}
@keyframes tl{from{opacity:0.5;}to{opacity:1;}}

/* ── LOGO ── */
.logo-wrap{
  position:relative;z-index:3;
  margin-top:16px;
  display:flex;flex-direction:column;align-items:center;
}

/* Pulse rings */
.rings{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
.ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(0,229,255,0.2);
  transform:translate(-50%,-50%);
  animation:ringExp 3s ease-out infinite;
}
.ring:nth-child(2){animation-delay:1s;}
.ring:nth-child(3){animation-delay:2s;}
@keyframes ringExp{
  0%{width:70px;height:70px;opacity:0.8;}
  100%{width:200px;height:200px;opacity:0;}
}

/* Orbit */
.orbit-wrap{
  position:absolute;top:50%;left:50%;
  width:110px;height:110px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  border:1px dashed rgba(0,229,255,0.25);
  animation:orbitSpin 10s linear infinite;
}
.orbit-dot{
  position:absolute;top:-4px;left:50%;transform:translateX(-50%);
  width:7px;height:7px;border-radius:50%;
  background:#00e5ff;box-shadow:0 0 8px #00e5ff;
}
@keyframes orbitSpin{to{transform:translate(-50%,-50%) rotate(360deg);}}

/* Glow behind logo */
.logo-glow{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:90px;height:90px;border-radius:50%;
  background:radial-gradient(rgba(0,120,255,0.55),rgba(0,200,255,0.25),transparent 65%);
  filter:blur(14px);
  animation:lgPulse 2s ease-in-out infinite alternate;
}
@keyframes lgPulse{from{transform:translate(-50%,-50%) scale(1);}to{transform:translate(-50%,-50%) scale(1.18);}}

/* Logo image */
.logo-img{
  position:relative;z-index:2;
  width:92px;height:92px;border-radius:50%;object-fit:cover;
  border:2.5px solid rgba(0,229,255,0.6);
  box-shadow:
    0 0 0 4px rgba(0,229,255,0.1),
    0 0 18px rgba(0,180,255,0.55),
    0 0 36px rgba(0,100,255,0.3);
  animation:logoTilt 7s ease-in-out infinite alternate;
  filter:drop-shadow(0 0 12px rgba(0,200,255,0.5));
}
@keyframes logoTilt{
  0%{transform:perspective(400px) rotateY(0deg);}
  100%{transform:perspective(400px) rotateY(10deg) scale(1.03);}
}

/* Brand name under logo */
.brand{
  margin-top:10px;
  font-family:'Orbitron',sans-serif;font-size:11.5px;font-weight:900;
  letter-spacing:1.5px;text-align:center;
  background:linear-gradient(135deg,#00e5ff 0%,#fff 45%,#ffd700 80%,#00e5ff 100%);
  background-size:250%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:bShim 4s linear infinite;
  filter:drop-shadow(0 0 6px rgba(0,229,255,0.4));
}
@keyframes bShim{0%{background-position:0%;}100%{background-position:250%;}}

/* ── DIVIDER ── */
.div-line{
  position:relative;z-index:3;
  width:90%;height:1px;margin:12px 0 10px;
  background:linear-gradient(90deg,transparent,#00e5ff,#ffd700,#00e5ff,transparent);
}
.div-dot{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:7px;height:7px;background:#00e5ff;border-radius:50%;
  box-shadow:0 0 8px #00e5ff,0 0 16px #00e5ff;
  animation:ddPop 2s ease-in-out infinite alternate;
}
@keyframes ddPop{from{transform:translate(-50%,-50%) scale(1);}to{transform:translate(-50%,-50%) scale(1.8);}}

/* ── BADGE ── */
.badge{
  position:relative;z-index:3;
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 13px;border-radius:20px;
  font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:1.5px;
  background:linear-gradient(135deg,#ff6a00,#ffd700);color:#000;
  box-shadow:0 0 14px rgba(255,140,0,0.5);
  margin-bottom:8px;
  animation:bdgPulse 1.8s ease-in-out infinite alternate;
}
@keyframes bdgPulse{from{transform:scale(1);}to{transform:scale(1.07);box-shadow:0 0 24px rgba(255,140,0,0.9);}}

/* ── COMING SOON ── */
.cs-wrap{position:relative;z-index:3;text-align:center;line-height:1;}
.cs-eyebrow{font-size:7px;letter-spacing:3px;color:rgba(150,220,255,0.6);text-transform:uppercase;margin-bottom:5px;}
.cs-main{
  font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;
  letter-spacing:1.5px;
  background:linear-gradient(135deg,#fff 0%,#00e5ff 35%,#fff 60%,#ffd700 90%);
  background-size:280%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:csG 4s linear infinite;
}
@keyframes csG{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.cs-sub{
  font-family:'Orbitron',sans-serif;font-size:7.5px;font-weight:700;
  color:#ffd700;letter-spacing:3px;text-transform:uppercase;
  margin-top:4px;text-shadow:0 0 8px rgba(255,215,0,0.5);
  animation:ssPulse 2.5s ease-in-out infinite alternate;
}
@keyframes ssPulse{from{opacity:0.7;}to{opacity:1;text-shadow:0 0 14px rgba(255,215,0,0.9);}}
.cs-reflect{
  font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;letter-spacing:1.5px;
  background:linear-gradient(180deg,rgba(0,229,255,0.15),transparent);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  transform:scaleY(-0.25);filter:blur(2px);opacity:0.35;
  margin-top:2px;user-select:none;
}

/* ── COUNTDOWN ── */
.cd-label{
  position:relative;z-index:3;
  font-size:7px;letter-spacing:2.5px;color:rgba(130,210,255,0.55);
  text-transform:uppercase;margin:12px 0 8px;
}
.countdown{
  position:relative;z-index:3;
  display:flex;justify-content:center;align-items:center;gap:5px;
  margin-bottom:12px;
}
.tbox{
  background:linear-gradient(145deg,rgba(0,90,180,0.15),rgba(0,30,80,0.3));
  border:1px solid rgba(0,229,255,0.2);
  border-radius:10px;padding:8px 7px 5px;min-width:44px;
  position:relative;overflow:hidden;
  transition:transform 0.2s;
}
.tbox:hover{transform:translateY(-3px) scale(1.07);}
.tbox::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#00e5ff,transparent);}
.tnum{
  font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;
  background:linear-gradient(180deg,#fff,#00e5ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 5px #00e5ff);
  line-height:1;display:block;text-align:center;
}
.tlbl{font-size:6px;letter-spacing:1.5px;color:rgba(150,220,255,0.6);text-transform:uppercase;margin-top:3px;display:block;text-align:center;}
.colon{
  font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;
  color:#00e5ff;margin-bottom:10px;
  text-shadow:0 0 8px #00e5ff;
  animation:blinkC 1s step-end infinite;
}
@keyframes blinkC{0%,100%{opacity:1;}50%{opacity:0.1;}}

/* ── PROGRESS ── */
.prog-wrap{
  position:relative;z-index:3;
  width:88%;background:rgba(0,229,255,0.07);
  border-radius:10px;height:5px;overflow:hidden;
  border:1px solid rgba(0,229,255,0.1);
  margin-bottom:6px;
}
.prog-bar{
  height:100%;width:0;border-radius:10px;
  background:linear-gradient(90deg,#0057ff,#00e5ff,#ffd700);
  animation:fp 3s cubic-bezier(0.4,0,0.2,1) 0.5s forwards;
  position:relative;
}
.prog-bar::after{content:'';position:absolute;top:0;right:0;width:20px;height:100%;background:rgba(255,255,255,0.6);filter:blur(5px);}
@keyframes fp{to{width:100%;}}
.prog-lbl{position:relative;z-index:3;font-size:6px;letter-spacing:1.5px;color:rgba(0,229,255,0.4);margin-bottom:0;}

/* ── STAY TUNED ── */
.stay{
  position:relative;z-index:3;
  display:flex;align-items:center;justify-content:center;gap:5px;
  margin-top:10px;
  font-family:'Orbitron',sans-serif;font-size:7px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,215,0,0.65);
  border-top:1px solid rgba(0,229,255,0.1);
  padding-top:10px;width:90%;
}
.sdot{width:5px;height:5px;border-radius:50%;background:#ffd700;box-shadow:0 0 5px #ffd700;animation:sdAnim 1.4s ease-in-out infinite;}
.sdot:nth-child(3){animation-delay:0.45s;}.sdot:nth-child(5){animation-delay:0.9s;}
@keyframes sdAnim{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.8);opacity:0.3;}}

/* Floating sparks */
.sparks{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden;}
.spark{position:absolute;border-radius:50%;animation:spRise var(--sd) ease-in var(--sdel) infinite;}
@keyframes spRise{0%{transform:translateY(0) scale(1);opacity:0.7;}100%{transform:translateY(-380px) translateX(var(--sx,0px)) scale(0);opacity:0;}}
</style>
</head>
<body>

<div class="card">
  <div class="card-border"></div>
  <div class="card-inner-bg"></div>

  <div class="content">
    <canvas id="sc"></canvas>
    <div class="grid"></div>
    <div class="top-line"></div>

    <!-- Sparks -->
    <div class="sparks">
      <div class="spark" style="width:3px;height:3px;background:#00e5ff;bottom:4%;left:10%;--sd:2.5s;--sdel:0s;--sx:12px;box-shadow:0 0 4px #00e5ff;"></div>
      <div class="spark" style="width:2px;height:2px;background:#ffd700;bottom:4%;left:30%;--sd:3.2s;--sdel:0.5s;--sx:-10px;box-shadow:0 0 3px #ffd700;"></div>
      <div class="spark" style="width:3px;height:3px;background:#00e5ff;bottom:4%;left:55%;--sd:2.1s;--sdel:1.1s;--sx:8px;box-shadow:0 0 4px #00e5ff;"></div>
      <div class="spark" style="width:2px;height:2px;background:#7c3aed;bottom:4%;left:75%;--sd:3.6s;--sdel:0.7s;--sx:-14px;box-shadow:0 0 3px #7c3aed;"></div>
      <div class="spark" style="width:3px;height:3px;background:#ffd700;bottom:4%;left:88%;--sd:2.8s;--sdel:1.8s;--sx:5px;box-shadow:0 0 4px #ffd700;"></div>
      <div class="spark" style="width:2px;height:2px;background:#00e5ff;bottom:4%;left:42%;--sd:4s;--sdel:2.2s;--sx:-8px;box-shadow:0 0 3px #00e5ff;"></div>
    </div>

    <!-- LOGO -->
    <div class="logo-wrap">
      <div class="rings">
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      </div>
      <div class="orbit-wrap"><div class="orbit-dot"></div></div>
      <div class="logo-glow"></div>
      <img class="logo-img" src="/mnt/user-data/uploads/1773368356178.jpg" alt="Cloud Phone BD">
      <div class="brand">CLOUD PHONE BD</div>
    </div>

    <!-- DIVIDER -->
    <div class="div-line"><div class="div-dot"></div></div>

    <!-- BADGE -->
    <div class="badge">⚡ NEW UPDATE</div>

    <!-- COMING SOON -->
    <div class="cs-wrap">
      <div class="cs-eyebrow">Get ready — something amazing</div>
      <div class="cs-main">COMING SOON</div>
      <div class="cs-reflect">COMING SOON</div>
      <div class="cs-sub">🚀 New Update Dropping</div>
    </div>

    <!-- COUNTDOWN -->
    <div class="cd-label">⏳ Countdown to Launch ⏳</div>
    <div class="countdown">
      <div class="tbox"><span class="tnum" id="d">15</span><span class="tlbl">Days</span></div>
      <div class="colon">:</div>
      <div class="tbox"><span class="tnum" id="h">00</span><span class="tlbl">Hrs</span></div>
      <div class="colon">:</div>
      <div class="tbox"><span class="tnum" id="m">00</span><span class="tlbl">Min</span></div>
      <div class="colon">:</div>
      <div class="tbox"><span class="tnum" id="s">00</span><span class="tlbl">Sec</span></div>
    </div>

    <!-- PROGRESS -->
    <div class="prog-wrap"><div class="prog-bar"></div></div>
    <div class="prog-lbl">LOADING... 100%</div>

    <!-- STAY TUNED -->
    <div class="stay">
      <div class="sdot"></div>
      Stay Tuned &amp; Follow Us
      <div class="sdot"></div>
      Drop Soon
      <div class="sdot"></div>
    </div>

  </div><!-- /content -->
</div><!-- /card -->

<script>
/* Stars */
const cv=document.getElementById('sc');
const cx=cv.getContext('2d');
cv.width=236;cv.height=356;
const stars=[];
for(let i=0;i<120;i++)stars.push({x:Math.random()*236,y:Math.random()*356,r:Math.random()*1.2+0.2,a:Math.random(),s:Math.random()*0.4+0.1,d:Math.random()>0.5?1:-1});
(function draw(){
  cx.clearRect(0,0,236,356);
  stars.forEach(s=>{s.a+=s.s*0.012*s.d;if(s.a>1||s.a<0)s.d*=-1;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(255,255,255,${s.a})`;cx.fill();});
  requestAnimationFrame(draw);
})();

/* Countdown 15 days */
const target=new Date(Date.now()+15*24*60*60*1000);
function pad(n){return String(n).padStart(2,'0');}
(function tick(){
  const diff=Math.max(0,target-Date.now());
  document.getElementById('d').textContent=pad(Math.floor(diff/86400000));
  document.getElementById('h').textContent=pad(Math.floor(diff%86400000/3600000));
  document.getElementById('m').textContent=pad(Math.floor(diff%3600000/60000));
  document.getElementById('s').textContent=pad(Math.floor(diff%60000/1000));
  setTimeout(tick,1000);
})();

/* Mouse tilt */
const card=document.querySelector('.card');
document.addEventListener('mousemove',e=>{
  const r=card.getBoundingClientRect();
  const cx2=r.left+r.width/2,cy2=r.top+r.height/2;
  const rx=(e.clientY-cy2)/cy2*8,ry=(e.clientX-cx2)/cx2*-8;
  card.style.transform=`perspective(800px) rotateX(${rx}deg) rotateY(${ry}deg)`;
  card.style.transition='transform 0.08s ease';
});
document.addEventListener('mouseleave',()=>{
  card.style.transform='perspective(800px) rotateX(0) rotateY(0)';
  card.style.transition='transform 0.5s ease';
});
</script>
</body>
</html>
